<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipes Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar {
    width: 220px;
    flex-shrink: 0;
    background: white;
    border-right: 1px solid #e0e0e0;
    padding: 20px 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  #sidebar h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 8px; }
  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: 8px; cursor: pointer;
    font-size: 14px; user-select: none; transition: background 0.15s;
  }
  .filter-chip:hover { background: #f0f0f0; }
  .filter-chip.active { background: #e8f0fe; color: #1a56db; font-weight: 500; }
  .filter-chip input { accent-color: #1a56db; }

  #search-wrap { display: flex; flex-direction: column; gap: 8px; }
  #searchInput {
    width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; outline: none;
  }
  #searchInput:focus { border-color: #1a56db; }
  #count { font-size: 13px; color: #888; margin-top: -8px; }

  /* Main */
  #main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  .toolbar { display: flex; justify-content: flex-end; gap: 10px; }
  .btn {
    padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500;
    cursor: pointer; border: none; transition: background 0.15s;
  }
  .btn-primary { background: #1a56db; color: white; }
  .btn-primary:hover { background: #1648c0; }
  .btn-secondary { background: #eee; color: #333; }
  .btn-secondary:hover { background: #e0e0e0; }

  table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  thead th {
    text-align: left; padding: 12px 14px; font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em; color: #888;
    background: #fafafa; border-bottom: 1px solid #eee;
    cursor: pointer; user-select: none;
  }
  thead th:hover { background: #f0f0f0; }
  thead th.sorted-asc::after { content: ' ↑'; }
  thead th.sorted-desc::after { content: ' ↓'; }
  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f9f9f9; }
  td { padding: 10px 14px; font-size: 14px; vertical-align: middle; }
  td.title-cell { max-width: 400px; }
  td.title-cell a { color: #1a56db; text-decoration: none; font-weight: 500; }
  td.title-cell a:hover { text-decoration: underline; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 12px; font-weight: 500;
  }
  .badge-pasta { background: #fff3e0; color: #e65100; }
  .badge-vis { background: #e3f2fd; color: #0277bd; }
  .badge-vegetarian { background: #e8f5e9; color: #2e7d32; }
  .badge-curry { background: #fff8e1; color: #f57f17; }
  .badge-ovenschotel { background: #fce4ec; color: #c62828; }
  .badge-none { background: #f5f5f5; color: #888; }
  .thumb { width: 48px; height: 36px; object-fit: cover; border-radius: 6px; display: block; }
  .no-results { text-align: center; padding: 60px 20px; color: #888; font-size: 16px; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 16px; padding: 28px;
    width: 480px; max-width: 95vw; display: flex; flex-direction: column; gap: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  }
  .modal h3 { font-size: 18px; font-weight: 600; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 13px; font-weight: 500; color: #555; }
  .field input, .field select {
    padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; outline: none; width: 100%;
  }
  .field input:focus, .field select:focus { border-color: #1a56db; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }

  .unsaved-banner {
    background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px;
    padding: 10px 14px; font-size: 13px; color: #795548;
    display: none; align-items: center; justify-content: space-between; gap: 12px;
  }
  .unsaved-banner.show { display: flex; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="search-wrap">
    <h2>Zoeken</h2>
    <input id="searchInput" type="text" placeholder="Titel...">
    <div id="count"></div>
  </div>

  <div>
    <h2>Type</h2>
    <div class="filter-group" id="traitFilters"></div>
  </div>

  <div>
    <h2>Dieet</h2>
    <div class="filter-group" id="dietFilters"></div>
  </div>

  <div>
    <h2>Regio</h2>
    <div class="filter-group" id="regionFilters"></div>
  </div>
</div>

<div id="main">
  <div class="toolbar">
    <div class="unsaved-banner" id="unsavedBanner">
      <span id="unsavedCount"></span>
      <button class="btn btn-primary" onclick="downloadJson()">Opslaan als JSON</button>
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Recept toevoegen</button>
  </div>

  <div>
    <table>
      <thead>
        <tr>
          <th style="width:56px"></th>
          <th data-col="title">Titel</th>
          <th data-col="trait">Type</th>
          <th data-col="diet">Dieet</th>
          <th data-col="region">Regio</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="no-results" id="noResults" style="display:none">Geen resultaten gevonden.</div>
  </div>
</div>

<!-- Add recipe modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Recept toevoegen</h3>
    <div class="field">
      <label>Titel *</label>
      <input id="fTitle" type="text" placeholder="Naam van het recept...">
    </div>
    <div class="field">
      <label>Recept (URL of boek + paginanummer)</label>
      <input id="fUrl" type="text" placeholder="https://... of boek p.42">
    </div>
    <div class="field">
      <label>Afbeelding URL</label>
      <input id="fImage" type="url" placeholder="https://...">
    </div>
    <div class="field">
      <label>Type</label>
      <select id="fTrait">
        <option value="">— Geen —</option>
        <option value="pasta">Pasta</option>
        <option value="vis">Vis</option>
        <option value="curry">Curry</option>
        <option value="ovenschotel">Ovenschotel</option>
      </select>
    </div>
    <div class="field">
      <label>Dieet</label>
      <select id="fDiet">
        <option value="none">Geen</option>
        <option value="vegetarian">Vegetarisch</option>
        <option value="vegan">Vegan</option>
      </select>
    </div>
    <div class="field">
      <label>Regio</label>
      <select id="fRegion">
        <option value="">— Geen —</option>
        <option value="Belgisch">Belgisch</option>
        <option value="Italiaans">Italiaans</option>
        <option value="Mediterraans">Mediterraans</option>
        <option value="Aziatisch">Aziatisch</option>
        <option value="Indisch">Indisch</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Annuleren</button>
      <button class="btn btn-primary" onclick="saveRecipe()">Toevoegen</button>
    </div>
  </div>
</div>

<script>
let data = [];
let sortCol = 'title';
let sortDir = 1;
let activeTraits = new Set();
let activeDiets = new Set();
let activeRegions = new Set();
let unsavedCount = 0;

fetch('full_recipes_merged.json')
  .then(r => r.json())
  .then(json => {
    data = json;
    buildFilters();
    render();
  });

function buildFilters() {
  const knownTraits = ['pasta', 'vis', 'curry', 'ovenschotel'];
  const dataTraits  = data.flatMap(r => (r.trait || '').split(',').map(v => v.trim()).filter(Boolean));
  const traits = [...new Set([...knownTraits, ...dataTraits])].sort();
  const diets   = [...new Set(data.map(r => r.diet).filter(Boolean))].sort();
  const regions = [...new Set(data.flatMap(r => (r.region || '').split(',').map(v => v.trim()).filter(Boolean)))].sort();

  document.getElementById('traitFilters').innerHTML = traits.map(t =>
    `<label class="filter-chip" data-type="trait" data-val="${t}">
      <input type="checkbox" value="${t}"> ${t.charAt(0).toUpperCase() + t.slice(1)}
    </label>`
  ).join('');

  document.getElementById('dietFilters').innerHTML = diets.map(d =>
    `<label class="filter-chip" data-type="diet" data-val="${d}">
      <input type="checkbox" value="${d}"> ${d === 'none' ? 'Geen' : d.charAt(0).toUpperCase() + d.slice(1)}
    </label>`
  ).join('');

  document.getElementById('regionFilters').innerHTML = regions.map(r =>
    `<label class="filter-chip" data-type="region" data-val="${r}">
      <input type="checkbox" value="${r}"> ${r}
    </label>`
  ).join('');

  document.querySelectorAll('.filter-chip input').forEach(cb => {
    cb.addEventListener('change', () => {
      const chip = cb.closest('.filter-chip');
      chip.classList.toggle('active', cb.checked);
      const type = chip.dataset.type;
      const val = chip.dataset.val;
      const set = type === 'trait' ? activeTraits : type === 'diet' ? activeDiets : activeRegions;
      cb.checked ? set.add(val) : set.delete(val);
      render();
    });
  });
}

document.getElementById('searchInput').addEventListener('input', render);

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('thead th').forEach(h => h.classList.remove('sorted-asc','sorted-desc'));
    th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
    render();
  });
});

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let rows = data.filter(r => {
    if (q && !r.title.toLowerCase().includes(q)) return false;
    if (activeTraits.size) {
      const vals = (r.trait || '').split(',').map(v => v.trim());
      if (!vals.some(v => activeTraits.has(v))) return false;
    }
    if (activeDiets.size && !activeDiets.has(r.diet)) return false;
    if (activeRegions.size) {
      const vals = (r.region || '').split(',').map(v => v.trim());
      if (!vals.some(v => activeRegions.has(v))) return false;
    }
    return true;
  });

  rows.sort((a, b) => {
    const av = (a[sortCol] || '').toLowerCase();
    const bv = (b[sortCol] || '').toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  document.getElementById('count').textContent = `${rows.length} recept${rows.length !== 1 ? 'en' : ''}`;
  document.getElementById('noResults').style.display = rows.length ? 'none' : 'block';
  document.querySelector('table').style.display = rows.length ? '' : 'none';

  document.getElementById('tbody').innerHTML = rows.map(r => `
    <tr>
      <td><img class="thumb" src="${r.image_url || ''}" loading="lazy" onerror="this.style.display='none'"></td>
      <td class="title-cell"><a href="${r.url}" target="_blank" rel="noopener">${r.title}</a></td>
      <td><span class="badge badge-${r.trait || 'none'}">${r.trait || '—'}</span></td>
      <td><span class="badge badge-${r.diet || 'none'}">${r.diet === 'none' ? 'Geen' : r.diet === 'vegetarian' ? 'Vegetarisch' : r.diet || '—'}</span></td>
      <td>${r.region || '—'}</td>
    </tr>
  `).join('');
}

// Modal
function openModal() {
  document.getElementById('fTitle').value = '';
  document.getElementById('fUrl').value = '';
  document.getElementById('fImage').value = '';
  document.getElementById('fTrait').value = '';
  document.getElementById('fDiet').value = 'none';
  document.getElementById('fRegion').value = '';
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 50);
}

function closeModal() {
  document.getElementById('addModal').classList.remove('open');
}

document.getElementById('addModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

function saveRecipe() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').focus(); return; }

  const entry = {
    title,
    url: document.getElementById('fUrl').value.trim() || '',
    image_url: document.getElementById('fImage').value.trim() || '',
    trait: document.getElementById('fTrait').value || null,
    diet: document.getElementById('fDiet').value || 'none',
    region: document.getElementById('fRegion').value || null,
  };

  data.push(entry);
  unsavedCount++;
  document.getElementById('unsavedCount').textContent = `${unsavedCount} nieuwe recept${unsavedCount !== 1 ? 'en' : ''} toegevoegd — nog niet opgeslagen`;
  document.getElementById('unsavedBanner').classList.add('show');
  buildFilters();
  render();
  closeModal();
}

function downloadJson() {
  const blob = new Blob([JSON.stringify(data, null, 4)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'full_recipes_merged.json';
  a.click();
  URL.revokeObjectURL(a.href);
  unsavedCount = 0;
  document.getElementById('unsavedBanner').classList.remove('show');
}
</script>
</body>
</html>
