<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e31e24">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Delhaize Lijst">
<title>Delhaize Boodschappenlijst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e31e24; --red-light: #ffeaea;
    --green: #00a651;
    --grey: #f5f5f5; --grey-mid: #e0e0e0;
    --text: #1a1a1a; --text-muted: #888;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; height: 100dvh; overflow: hidden; }
  body { font-family: 'Outfit', sans-serif; background: white; color: var(--text); max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; }

  /* Sync bar */
  .sync-bar { height: 3px; background: var(--grey-mid); position: relative; overflow: hidden; flex-shrink: 0; }
  .sync-bar.syncing::after { content:''; position:absolute; left:-40%; width:40%; height:100%; background:var(--green); animation: syncSlide 0.9s ease-in-out infinite; }
  .sync-bar.error::after { content:''; position:absolute; inset:0; background:var(--red); }
  .sync-bar.ok::after { content:''; position:absolute; inset:0; background:var(--green); opacity:0.5; }
  @keyframes syncSlide { 0%{left:-40%} 100%{left:140%} }

  /* Header */
  .header { background: var(--red); color: white; padding: 0 16px; flex-shrink: 0; z-index: 100; box-shadow: 0 2px 12px rgba(227,30,36,0.25); }
  .header-top { display:flex; align-items:center; justify-content:space-between; padding: 12px 0 8px; }
  .logo-wrap { display:flex; flex-direction:column; gap:1px; }
  .logo { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
  .logo span { opacity:0.7; font-weight:300; }
  .list-id-label { font-size:10px; opacity:0.65; letter-spacing:0.04em; }
  .header-actions { display:flex; gap:8px; }
  .icon-btn { background:rgba(255,255,255,0.18); border:none; border-radius:10px; color:white; width:38px; height:38px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; transition:background 0.15s; }
  .icon-btn:active { background:rgba(255,255,255,0.32); }

  /* Search */
  .search-input { width:100%; background:rgba(255,255,255,0.95); border:none; border-radius:10px; padding:10px 38px 10px 14px; font-family:'Outfit',sans-serif; font-size:15px; color:var(--text); outline:none; }
  .search-input::placeholder { color:#aaa; }
  .search-icon { position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:16px; color:#aaa; pointer-events:none; }

  /* Dropdown */
  .search-dropdown { position:fixed; top:133px; left:50%; transform:translateX(-50%); width:min(480px,100vw); background:white; border-radius:0 0 var(--radius) var(--radius); box-shadow:var(--shadow-lg); z-index:200; max-height:60vh; overflow-y:auto; display:none; }
  .search-dropdown.show { display:block; }
  .search-result-item { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:1px solid var(--grey-mid); gap:12px; transition:background 0.1s; cursor:pointer; }
  .search-result-item:last-child { border-bottom:none; }
  .search-result-item:active { background:var(--grey); }
  .sri-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
  .sri-cat { font-size:12px; color:var(--text-muted); white-space:nowrap; flex-shrink:0; text-align:right; }
  .no-results { padding:20px; text-align:center; color:var(--text-muted); font-size:14px; }

  /* Tabs */
  .tabs { display:flex; background:white; border-bottom:2px solid var(--grey-mid); flex-shrink:0; z-index:90; }
  .tab { flex:1; padding:11px 8px; text-align:center; font-size:13px; font-weight:500; color:var(--text-muted); cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; transition:color 0.15s,border-color 0.15s; }
  .tab.active { color:var(--red); border-color:var(--red); font-weight:700; }

  main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 0 100px; }

  /* Loading */
  .loading-overlay { position:fixed; inset:0; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; gap:16px; }
  .loading-overlay.hidden { display:none; }
  .loading-spinner { width:42px; height:42px; border:4px solid var(--grey-mid); border-top-color:var(--red); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-size:15px; color:var(--text-muted); font-weight:500; }

  /* Category */
  .category-section { margin-bottom:10px; }
  .category-header { display:flex; align-items:center; justify-content:space-between; background:var(--grey); border-radius:var(--radius); padding:13px 16px; cursor:pointer; user-select:none; transition:background 0.12s; }
  .category-header:active { background:var(--grey); }
  .cat-left { display:flex; align-items:center; gap:10px; }
  .cat-emoji { font-size:22px; }
  .cat-name { font-weight:600; font-size:15px; }
  .cat-count { background:var(--red); color:white; border-radius:20px; padding:2px 8px; font-size:12px; font-weight:700; min-width:22px; text-align:center; }
  .cat-chevron { font-size:14px; color:var(--text-muted); transition:transform 0.2s; }
  .category-section.collapsed .cat-chevron { transform:rotate(-90deg); }
  .category-items { margin-top:4px; display:flex; flex-direction:column; gap:4px; overflow:hidden; transition:max-height 0.3s ease; max-height:2000px; }
  .category-section.collapsed .category-items { max-height:0; }

  /* Item card */
  .item-card { background:white; border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:12px; transition:opacity 0.3s,transform 0.3s,max-height 0.35s,padding 0.35s; }
  .item-card.checking { opacity:0; transform:translateX(60px); pointer-events:none; max-height:0; padding:0; overflow:hidden; }
  .item-card.done .item-name { text-decoration:line-through; color:var(--text-muted); }

  .item-checkbox { width:24px; height:24px; border:2.5px solid var(--grey-mid); border-radius:7px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:background 0.15s,border-color 0.15s; }
  .item-checkbox.checked { background:var(--green); border-color:var(--green); }
  .item-checkbox.checked::after { content:'✓'; color:white; font-size:14px; font-weight:700; line-height:1; }

  .item-info { flex:1; min-width:0; overflow:hidden; }
  .item-name { font-weight:500; font-size:15px; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .item-note-inline { font-size:13px; color:var(--text-muted); font-style:italic; font-weight:400; }

  .item-qty { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .qty-btn { width:28px; height:28px; border:2px solid var(--grey-mid); border-radius:8px; background:none; font-size:18px; line-height:1; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-muted); font-weight:300; transition:border-color 0.12s,color 0.12s; }
  .qty-btn:active { border-color:var(--red); color:var(--red); }
  .qty-num { font-weight:700; font-size:16px; min-width:20px; text-align:center; }

  .item-action-btn { width:28px; height:28px; border:none; border-radius:7px; background:var(--grey); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; transition:background 0.12s; }
  .item-action-btn:active { background:var(--grey-mid); }

  /* Empty */
  .empty-state { text-align:center; padding:60px 24px; color:var(--text-muted); }
  .empty-icon { font-size:54px; margin-bottom:14px; }
  .empty-title { font-size:18px; font-weight:600; color:var(--text); margin-bottom:8px; }
  .empty-sub { font-size:14px; line-height:1.5; }

  /* Browse */
  .browse-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .browse-card { background:white; border-radius:var(--radius); padding:16px 12px; box-shadow:var(--shadow); cursor:pointer; text-align:center; transition:transform 0.1s; border:2px solid transparent; }
  .browse-card:active { transform:scale(0.97); }
  .bc-emoji { font-size:32px; margin-bottom:6px; }
  .bc-name { font-size:13px; font-weight:600; line-height:1.3; }

  /* Panel */
  .products-panel { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%); width:min(480px,100vw); background:white; border-radius:20px 20px 0 0; box-shadow:0 -8px 32px rgba(0,0,0,0.14); z-index:300; max-height:65vh; display:flex; flex-direction:column; transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); }
  .products-panel.open { transform:translateX(-50%) translateY(0); }
  .panel-handle { width:40px; height:4px; background:var(--grey-mid); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
  .panel-header { padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--grey-mid); flex-shrink:0; }
  .panel-title { font-size:16px; font-weight:700; }
  .panel-close { width:30px; height:30px; border:none; background:var(--grey); border-radius:50%; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; }
  .panel-products { overflow-y:auto; flex:1; padding:8px 12px 24px; }
  .product-item { display:flex; align-items:center; justify-content:space-between; padding:11px 12px; border-bottom:1px solid var(--grey); gap:10px; }
  .product-item:last-child { border-bottom:none; }
  .pi-name { font-size:14px; font-weight:500; flex:1; }
  .pi-add { background:var(--red); color:white; border:none; border-radius:8px; padding:6px 14px; font-family:'Outfit',sans-serif; font-size:13px; font-weight:600; cursor:pointer; flex-shrink:0; }
  .pi-add.added { background:var(--green); }
  .panel-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:299; display:none; }
  .panel-overlay.show { display:block; }

  /* Modals */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:400; display:none; align-items:flex-end; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal-box { background:white; border-radius:20px 20px 0 0; padding:20px 20px 40px; width:min(480px,100vw); }
  .modal-title { font-size:17px; font-weight:700; margin-bottom:14px; }
  .modal-input { width:100%; border:2px solid var(--grey-mid); border-radius:10px; padding:12px 14px; font-family:'Outfit',sans-serif; font-size:15px; outline:none; resize:none; color:var(--text); }
  .modal-input:focus { border-color:var(--red); }
  .modal-btns { display:flex; gap:10px; margin-top:12px; }
  .btn { flex:1; padding:12px; border-radius:10px; border:none; font-family:'Outfit',sans-serif; font-size:15px; font-weight:600; cursor:pointer; }
  .btn-primary { background:var(--red); color:white; }
  .btn-secondary { background:var(--grey); color:var(--text); }

  /* Share modal */
  .share-modal { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:400; display:none; align-items:flex-end; justify-content:center; }
  .share-modal.show { display:flex; }
  .share-box { background:white; border-radius:20px 20px 0 0; padding:20px 20px 48px; width:min(480px,100vw); }
  .share-title { font-size:18px; font-weight:700; margin-bottom:4px; }
  .share-sub { font-size:13px; color:var(--text-muted); margin-bottom:16px; }
  .share-link-box { background:var(--grey); border-radius:10px; padding:12px 14px; font-size:12px; color:var(--text-muted); word-break:break-all; margin-bottom:14px; border:2px solid var(--grey-mid); font-family:monospace; }
  .share-options { display:flex; gap:10px; flex-direction:column; }
  .share-btn { display:flex; align-items:center; gap:12px; background:var(--grey); border:none; border-radius:12px; padding:14px 16px; font-family:'Outfit',sans-serif; font-size:15px; font-weight:500; cursor:pointer; text-align:left; transition:background 0.12s; }
  .share-btn:active { background:var(--grey-mid); }
  .share-btn-icon { font-size:22px; width:28px; }

  /* FAB */
  .fab { position:fixed; bottom:24px; right:max(24px, calc(50% - 240px + 24px)); background:var(--red); color:#ffffff; border:none; border-radius:50%; width:52px; height:52px; font-size:24px; cursor:pointer; box-shadow:0 4px 20px rgba(227,30,36,0.45); display:flex; align-items:center; justify-content:center; z-index:80; transition:transform 0.15s; }
  .fab:active { transform:scale(0.96); }

  .add-custom-btn { width:100%; background:white; border:2px dashed var(--grey-mid); border-radius:var(--radius); padding:14px; font-family:'Outfit',sans-serif; font-size:14px; color:var(--text-muted); cursor:pointer; margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:8px; font-weight:500; transition:border-color 0.15s,color 0.15s; }
  .add-custom-btn:active { border-color:var(--red); color:var(--red); }

  .checked-section { margin-top:16px; }
  .checked-title { font-size:13px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; padding:0 4px 8px; }

  /* Toast */
  .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:#222; color:white; padding:10px 20px; border-radius:10px; font-size:14px; font-weight:500; z-index:500; opacity:0; transition:opacity 0.2s,transform 0.2s; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* New list modal */
  .newlist-modal { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:600; display:flex; align-items:center; justify-content:center; padding:24px; }
  .newlist-box { background:white; border-radius:20px; padding:28px 24px; width:100%; max-width:400px; text-align:center; }
  .newlist-box h2 { font-size:22px; font-weight:700; margin-bottom:8px; }
  .newlist-box p { font-size:14px; color:var(--text-muted); margin-bottom:24px; line-height:1.5; }

  .unit-btn { padding:5px 10px; border:2px solid var(--grey-mid); border-radius:8px; background:white; font-size:13px; font-weight:600; cursor:pointer; color:var(--text-muted); transition:all 0.12s; }
  .unit-btn.active { border-color:var(--red); color:var(--red); background:#fff5f5; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Verbinden met lijst...</div>
</div>

<div class="newlist-modal" id="newlistModal" style="display:none;">
  <div class="newlist-box">
    <div style="font-size:48px;margin-bottom:12px;">🛒</div>
    <h2>Lionlist</h2>
    <p>Maak een nieuwe gedeelde boodschappenlijst aan. Iedereen met de link kan live mee bewerken.</p>
    <button class="btn btn-primary" onclick="createNewList()" style="width:100%;padding:14px;font-size:16px;">➕ Nieuwe lijst aanmaken</button>
  </div>
</div>

<div class="sync-bar" id="syncBar"></div>

<header class="header">
  <div class="header-top">
    <div class="logo-wrap">
      <div class="logo">lion<span>list</span></div>
      <div class="list-id-label" id="listIdLabel">Verbinden...</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="openShare()" title="Deel lijst">📤</button>
      <button class="icon-btn" onclick="confirmNewList()" title="Nieuwe lijst">🆕</button>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" id="tab-list" onclick="switchTab('list')">📋 Mijn lijst</div>
  <div class="tab" id="tab-browse" onclick="switchTab('browse')">🛒 Bladeren</div>
</div>

<main id="main"></main>

<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
<div class="products-panel" id="productsPanel">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <span class="panel-title" id="panelTitle">Producten</span>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-products" id="panelProducts"></div>
</div>

<div class="modal-overlay" id="noteModal">
  <div class="modal-box">
    <div class="modal-title" id="detailTitle">Product</div>

    <!-- Quantity + unit -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
      <button class="qty-btn" onclick="detailChangeQty(-1)" style="width:36px;height:36px;font-size:22px;">−</button>
      <span id="detailQty" style="font-size:22px;font-weight:700;min-width:32px;text-align:center;">1</span>
      <button class="qty-btn" onclick="detailChangeQty(1)" style="width:36px;height:36px;font-size:22px;">+</button>
      <div style="display:flex;gap:6px;flex:1;justify-content:flex-end;">
        <button class="unit-btn active" id="unit-aantal" onclick="selectUnit('aantal')">×</button>
        <button class="unit-btn" id="unit-kg" onclick="selectUnit('kg')">kg</button>
        <button class="unit-btn" id="unit-g" onclick="selectUnit('g')">g</button>
        <button class="unit-btn" id="unit-l" onclick="selectUnit('l')">l</button>
      </div>
    </div>

    <!-- Note -->
    <textarea class="modal-input" id="noteInput" rows="3" placeholder="Notitie: biologisch, huismerk ok, rijp genoeg..."></textarea>

    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeNote()">Annuleren</button>
      <button class="btn btn-primary" onclick="saveNote()">Opslaan</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="customModal">
  <div class="modal-box">
    <div class="modal-title">➕ Product toevoegen</div>
    <input type="text" class="modal-input" id="customName" placeholder="Productnaam..." style="margin-bottom:10px;">
    <select class="modal-input" id="customCat"></select>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeCustom()">Annuleren</button>
      <button class="btn btn-primary" onclick="saveCustom()">Toevoegen</button>
    </div>
  </div>
</div>

<div class="share-modal" id="shareModal">
  <div class="share-box">
    <div class="share-title">📤 Lijst delen</div>
    <div class="share-sub">Iedereen met de link kan live producten toevoegen en afvinken.</div>
    <div class="share-link-box" id="shareLink"></div>
    <div class="share-options">
      <button class="share-btn" onclick="doShare('copy')">
        <span class="share-btn-icon">🔗</span>
        <div><strong>Link kopiëren</strong><br><small style="color:#888;font-size:12px;">Plak in WhatsApp, iMessage, e-mail...</small></div>
      </button>
      <button class="share-btn" onclick="doShare('native')">
        <span class="share-btn-icon">📱</span>
        <div><strong>Delen via...</strong><br><small style="color:#888;font-size:12px;">WhatsApp, SMS, e-mail en meer</small></div>
      </button>
      <button class="share-btn" onclick="closeShare()" style="background:transparent;color:#aaa;justify-content:center;">Annuleren</button>
    </div>
  </div>
</div>

<div id="fabSearchModal" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;max-height:50vh;background:white;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,0.15);flex-direction:column;">
  <div style="padding:14px 16px 10px;flex-shrink:0;border-bottom:1px solid var(--grey-mid);display:flex;align-items:center;gap:10px;">
    <input type="text" id="fabSearchInput" class="modal-input" placeholder="Zoek of typ een product..." style="margin:0;flex:1;" oninput="onFabSearch(this.value)" autocomplete="off" enterkeyhint="search">
    <button onclick="closeFabSearch()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;padding:4px;flex-shrink:0;">✕</button>
  </div>
  <div id="fabSearchResults" style="overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,16px);"></div>
</div>
<div id="fabSearchBackdrop" style="display:none;position:fixed;inset:0;z-index:499;" onclick="closeFabSearch()"></div>

<label class="fab" for="fabTriggerInput" onclick="openFabSearch()">+</label>
<input id="fabTriggerInput" type="text" style="position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;bottom:50px;right:50px;" autocomplete="off">
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, remove, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD29JPhRCjywdu6RuTfIADfHFOdJMzejNs",
  authDomain: "shopping-list-app-7b680.firebaseapp.com",
  databaseURL: "https://shopping-list-app-7b680-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "shopping-list-app-7b680",
  storageBucket: "shopping-list-app-7b680.firebasestorage.app",
  messagingSenderId: "476561112723",
  appId: "1:476561112723:web:3e7bb2e1e3653c05f19766"
};

const firebaseApp = initializeApp(firebaseConfig);

// ── Helpers ───────────────────────────────────────────────────────────
function getListIdFromUrl() { return new URLSearchParams(window.location.search).get('list'); }
function setListIdInUrl(id) { const u = new URL(window.location.href); u.searchParams.set('list', id); history.replaceState({}, '', u.toString()); }
function generateId() { return Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4); }

function setSyncBar(state) {
  const b = document.getElementById('syncBar');
  b.className = 'sync-bar ' + state;
  if (state === 'ok') setTimeout(() => b.classList.remove('ok'), 1200);
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Init ──────────────────────────────────────────────────────────────
window.createNewList = function() {
  const id = generateId();
  document.getElementById('newlistModal').style.display = 'none';
  initList(id);
};

function initList(id) {
  listId = id;
  setListIdInUrl(id);
  document.getElementById('listIdLabel').textContent = 'Lijst: ' + id;
  localStorage.setItem('lastListId', id);
  dbRef = ref(db, 'lists/' + id + '/items');
  setSyncBar('syncing');
  onValue(dbRef, (snapshot) => {
    list = snapshot.val() || {};
    setSyncBar('ok');
    document.getElementById('loadingOverlay').classList.add('hidden');
    render();
  }, (err) => {
    setSyncBar('error');
    console.error('Firebase error:', err);
    document.getElementById('loadingOverlay').innerHTML =
      '<div style="padding:24px;text-align:center;max-width:340px;">' +
      '<div style="font-size:40px;margin-bottom:12px;">⚠️</div>' +
      '<div style="font-size:16px;font-weight:700;margin-bottom:8px;">Verbindingsfout</div>' +
      '<div style="font-size:12px;color:#e31e24;background:#ffeaea;border-radius:10px;padding:12px;word-break:break-all;text-align:left;margin-bottom:16px;font-family:monospace;">' +
      (err.code || '') + ': ' + (err.message || JSON.stringify(err)) +
      '</div>' +
      '<button onclick="location.reload()" style="background:#e31e24;color:white;border:none;border-radius:10px;padding:12px 24px;font-size:15px;font-weight:600;cursor:pointer;">Opnieuw proberen</button>' +
      '</div>';
  });
}

  const done   = entries.filter(([,i]) => i.checked);

  if (entries.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Lijst is leeg</div><div class="empty-sub">Voeg producten toe via de zoekbalk of het tabblad Bladeren.</div></div>`;
    return;
  }

  const byCat = {};
  active.forEach(([id, item]) => { const c = item.catId||'other'; if(!byCat[c])byCat[c]=[]; byCat[c].push([id,item]); });

  let html = ``;

  CATEGORIES.forEach(cat => {
    const catItems = byCat[cat.id];
    if (!catItems || !catItems.length) return;
    const col = collapsedCats[cat.id] ? 'collapsed' : '';
    html += `<div class="category-section ${col}" id="cat-${cat.id}">
      <div class="category-header" onclick="toggleCat('${cat.id}')">
        <div class="cat-left"><span class="cat-emoji">${cat.emoji}</span><span class="cat-name">${cat.name}</span></div>
        <div style="display:flex;align-items:center;gap:8px;"><span class="cat-count">${catItems.length}</span><span class="cat-chevron">▾</span></div>
      </div>
      <div class="category-items">${catItems.map(([id,item]) => renderItem(id,item)).join('')}</div>
    </div>`;
  });

  const other = byCat['other']||[];
  if (other.length) {
    const col = collapsedCats['other'] ? 'collapsed' : '';
    html += `<div class="category-section ${col}" id="cat-other">
      <div class="category-header" onclick="toggleCat('other')">
        <div class="cat-left"><span class="cat-emoji">📌</span><span class="cat-name">Overig</span></div>
        <div style="display:flex;align-items:center;gap:8px;"><span class="cat-count">${other.length}</span><span class="cat-chevron">▾</span></div>
      </div>
      <div class="category-items">${other.map(([id,item]) => renderItem(id,item)).join('')}</div>
    </div>`;
  }

  if (done.length) {
    html += `<div class="checked-section"><div class="checked-title">✓ In mandje (${done.length})</div>${done.map(([id,item]) => renderItem(id,item)).join('')}</div>`;
  }
  main.innerHTML = html;
}

function renderItem(id, item) {
  const unit = item.unit||'aantal';
  const qtyLabel = `${item.qty||1} ${unit==='aantal'?'×':unit}`;
  return `<div class="item-card ${item.checked?'done':''}" id="item-${id}">
    <div class="item-checkbox ${item.checked?'checked':''}" onclick="checkItem('${id}')"></div>
    <div class="item-info" onclick="openDetail('${id}')" style="cursor:pointer;flex:1;min-width:0;">
      <div class="item-name">${item.name}${item.note ? ` <span class="item-note-inline">· ${item.note}</span>` : ''}</div>
    </div>
    <span class="item-qty-label" onclick="openDetail('${id}')" style="cursor:pointer;font-size:13px;color:var(--text-muted);flex-shrink:0;font-weight:500;">${qtyLabel}</span>
    <button class="item-action-btn" onclick="removeItem('${id}')">🗑️</button>
  </div>`;
}

function renderBrowse() {
  const main = document.getElementById('main');
  let html = `<div class="browse-grid">`;
  CATEGORIES.forEach(cat => {
    const count = Object.values(list).filter(i => i.catId===cat.id && !i.checked).length;
    html += `<div class="browse-card" onclick="openPanel('${cat.id}')">
      <div class="bc-emoji">${cat.emoji}</div>
      <div class="bc-name">${cat.name}</div>
      ${count ? `<div style="margin-top:6px;"><span class="cat-count">${count}</span></div>` : ''}
    </div>`;
  });
  html += `</div>`;
  main.innerHTML = html;
}

// ── Actions ───────────────────────────────────────────────────────────
window.toggleCat = function(catId) {
  collapsedCats[catId] = !collapsedCats[catId];
  const el = document.getElementById('cat-'+catId);
  if (el) el.classList.toggle('collapsed', collapsedCats[catId]);
};

window.checkItem = function(id) {
  const item = list[id]; if(!item) return;
  setSyncBar('syncing');
  if (!item.checked) {
    const el = document.getElementById('item-'+id);
    if (el) el.classList.add('checking');
    setTimeout(() => update(ref(db,'lists/'+listId+'/items/'+id), {checked:true}), 300);
  } else {
    update(ref(db,'lists/'+listId+'/items/'+id), {checked:false});
  }
};

window.changeQty = function(id, delta) {
  const item = list[id]; if(!item) return;
  const newQty = Math.max(1, (item.qty||1)+delta);
  const el = document.querySelector(`#item-${id} .qty-num`);
  if (el) el.textContent = newQty;
  setSyncBar('syncing');
  update(ref(db,'lists/'+listId+'/items/'+id), {qty:newQty});
};

window.removeItem = function(id) {
  setSyncBar('syncing');
  remove(ref(db,'lists/'+listId+'/items/'+id));
};

function addProduct(name, catId) {
  const existing = Object.entries(list).find(([,i]) => i.name===name && i.catId===catId && !i.checked);
  setSyncBar('syncing');
  if (existing) {
    const [id, item] = existing;
    update(ref(db,'lists/'+listId+'/items/'+id), {qty:(item.qty||1)+1});
    showToast(`+1 ${name}`);
  } else {
    const newRef = push(ref(db,'lists/'+listId+'/items'));
    set(newRef, {name, catId:catId||'other', qty:1, note:'', checked:false});
    showToast(`${name} toegevoegd ✓`);
  }
}

// ── Product detail modal ───────────────────────────────────────────────
window.openDetail = window.openNote = function(id) {
  noteTarget = id;
  const item = list[id]; if (!item) return;
  document.getElementById('detailTitle').textContent = item.name.split('|')[0].trim();
  document.getElementById('noteInput').value = item.note||'';
  document.getElementById('detailQty').textContent = item.qty||1;
  selectUnit(item.unit||'aantal', false);
  document.getElementById('noteModal').classList.add('show');
};
window.closeNote = function() { noteTarget=null; document.getElementById('noteModal').classList.remove('show'); };

window.detailChangeQty = function(delta) {
  const el = document.getElementById('detailQty');
  el.textContent = Math.max(1, parseInt(el.textContent)+delta);
};

let _selectedUnit = 'aantal';
window.selectUnit = function(unit, updateBtn=true) {
  _selectedUnit = unit;
  if (updateBtn) {
    ['aantal','kg','g','l'].forEach(u => {
      const b = document.getElementById('unit-'+u);
      if (b) b.classList.toggle('active', u===unit);
    });
  } else {
    ['aantal','kg','g','l'].forEach(u => {
      const b = document.getElementById('unit-'+u);
      if (b) b.classList.toggle('active', u===unit);
    });
  }
};

window.saveNote = function() {
  if (!noteTarget) return;
  setSyncBar('syncing');
  const qty = parseInt(document.getElementById('detailQty').textContent)||1;
  const note = document.getElementById('noteInput').value.trim();
  update(ref(db,'lists/'+listId+'/items/'+noteTarget), {note, qty, unit:_selectedUnit});
  closeNote();
};

// ── Custom product ─────────────────────────────────────────────────────
window.openCustom = function() {
  document.getElementById('customCat').innerHTML = CATEGORIES.map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
  document.getElementById('customName').value = '';
  document.getElementById('customModal').classList.add('show');
  setTimeout(() => document.getElementById('customName').focus(), 100);
};
window.closeCustom = function() { document.getElementById('customModal').classList.remove('show'); };
window.saveCustom = function() {
  const name = document.getElementById('customName').value.trim();
  const catId = document.getElementById('customCat').value;
  if (!name) return;
  addProduct(name, catId); closeCustom();
};

// ── Browse panel ───────────────────────────────────────────────────────
window.openPanel = function(catId) {
  const cat = CATEGORIES.find(c=>c.id===catId); if(!cat) return;
  document.getElementById('panelTitle').textContent = cat.emoji+' '+cat.name;
  const products = document.getElementById('panelProducts');
  products.innerHTML = cat.products.map(p => {
    const inList = Object.values(list).find(i=>i.name===p&&i.catId===catId&&!i.checked);
    const k = catId+'_'+p.replace(/\W/g,'_');
    return `<div class="product-item">
      <span class="pi-name">${p}</span>
      <button class="pi-add ${inList?'added':''}" id="pibtn-${k}" onclick="panelAdd('${catId}','${p.replace(/'/g,"\\'")}','${k}')">
        ${inList?'✓ In lijst':'+ Voeg toe'}
      </button>
    </div>`;
  }).join('');
  document.getElementById('productsPanel').classList.add('open');
  document.getElementById('panelOverlay').classList.add('show');
};
window.closePanel = function() {
  document.getElementById('productsPanel').classList.remove('open');
  document.getElementById('panelOverlay').classList.remove('show');
  if (currentTab==='browse') renderBrowse();
};
window.panelAdd = function(catId, name, k) {
  addProduct(name, catId);
  const btn = document.getElementById('pibtn-'+k);
  if (btn) { btn.textContent='✓ In lijst'; btn.classList.add('added'); }
};

// ── Search ─────────────────────────────────────────────────────────────
let searchTimeout = null;
window.onSearch = function(val) { clearTimeout(searchTimeout); searchTimeout = setTimeout(()=>doSearch(val),120); };

function doSearch(val) {
  const q = val.trim().toLowerCase();
  const dropdown = document.getElementById('searchDropdown');
  const results  = document.getElementById('searchResults');
  if (!q) { dropdown.classList.remove('show'); return; }
  let matches = [];
  CATEGORIES.forEach(cat => cat.products.forEach(p => { if(p.toLowerCase().includes(q)) matches.push({name:p,cat:cat.name,catId:cat.id,emoji:cat.emoji}); }));
  if (!matches.length) {
    results.innerHTML = `<div class="no-results">Geen resultaten voor "<strong>${val}</strong>"</div>
      <div class="search-result-item" onclick="openCustomFromSearch('${val.replace(/'/g,"\\'")}')">
        <div class="sri-info"><div class="sri-name">➕ "${val}" toevoegen</div><div class="sri-cat">Eigen product</div></div>
      </div>`;
  } else {
    results.innerHTML = matches.slice(0,12).map(m => {
      const inList = Object.values(list).find(i=>i.name===m.name&&i.catId===m.catId&&!i.checked);
      const k = 'sr_'+m.catId+'_'+m.name.replace(/\W/g,'_');
      return `<div class="search-result-item">
        <div class="sri-info"><div class="sri-name">${m.emoji} ${m.name}</div><div class="sri-cat">${m.cat}</div></div>
        <button class="sri-add ${inList?'added':''}" id="${k}" onclick="searchAdd('${m.catId}','${m.name.replace(/'/g,"\\'")}','${k}')">
          ${inList?'✓':'+ Voeg toe'}
        </button>
      </div>`;
    }).join('');
  }
  dropdown.classList.add('show');
}

window.searchAdd = function(catId, name, k) {
  addProduct(name, catId);
  const btn = document.getElementById(k);
  if (btn) { btn.textContent='✓'; btn.classList.add('added'); }
};
window.showDropdown = function() { const v=document.getElementById('searchInput').value; if(v.trim()) doSearch(v); };
window.openCustomFromSearch = function(val) {
  document.getElementById('customCat').innerHTML = CATEGORIES.map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
  document.getElementById('customName').value = val;
  document.getElementById('customModal').classList.add('show');
  document.getElementById('searchDropdown').classList.remove('show');
  document.getElementById('searchInput').value = '';
};
document.addEventListener('click', e => {
  if (!document.getElementById('searchDropdown').contains(e.target) && e.target!==document.getElementById('searchInput'))
    document.getElementById('searchDropdown').classList.remove('show');
});

// ── Tabs ───────────────────────────────────────────────────────────────
window.switchTab = function(tab) {
  currentTab = tab;
  document.getElementById('tab-list').classList.toggle('active', tab==='list');
  document.getElementById('tab-browse').classList.toggle('active', tab==='browse');
  render();
};

// ── Share ──────────────────────────────────────────────────────────────
window.openShare = function() {
  const url = window.location.href;
  document.getElementById('shareLink').textContent = url;
  document.getElementById('shareModal').classList.add('show');
  window._shareUrl = url;
};
window.closeShare = function() { document.getElementById('shareModal').classList.remove('show'); };
window.doShare = function(method) {
  if (method==='copy') {
    navigator.clipboard.writeText(window._shareUrl).then(()=>{showToast('Link gekopieerd! ✓'); closeShare();}).catch(()=>{
      const ta=document.createElement('textarea'); ta.value=window._shareUrl; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      showToast('Link gekopieerd! ✓'); closeShare();
    });
  } else {
    const text = 'Bekijk mijn boodschappenlijst: '+window._shareUrl;
    if (navigator.share) { navigator.share({title:'Boodschappenlijst',text,url:window._shareUrl}).then(closeShare).catch(()=>{}); }
    else { window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank'); closeShare(); }
  }
};

// ── New list ───────────────────────────────────────────────────────────
window.confirmNewList = function() {
  if (confirm('Nieuwe lege lijst aanmaken? De huidige lijst blijft beschikbaar via de gedeelde link.')) createNewList();
};

// ── Boot ───────────────────────────────────────────────────────────────
const urlListId = getListIdFromUrl();
if (urlListId) {
  initList(urlListId);
} else {
  const lastId = localStorage.getItem('lastListId');
  if (lastId) { initList(lastId); }
  else { document.getElementById('loadingOverlay').classList.add('hidden'); document.getElementById('newlistModal').style.display='flex'; }
}

// ── FAB Search ─────────────────────────────────────────────────────────
// Keep fab sheet above the keyboard using visualViewport
function positionFabSheet() {
  const modal = document.getElementById('fabSearchModal');
  if (modal.style.display === 'none') return;
  const vv = window.visualViewport;
  if (vv) {
    const offsetFromBottom = window.innerHeight - (vv.offsetTop + vv.height);
    modal.style.bottom = offsetFromBottom + 'px';
  }
}
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', positionFabSheet);
  window.visualViewport.addEventListener('scroll', positionFabSheet);
}

window.openFabSearch = function() {
  const trigger = document.getElementById('fabTriggerInput');
  trigger.value = '';
  trigger.focus({ preventScroll: true });

  const modal = document.getElementById('fabSearchModal');
  modal.style.display = 'flex';
  modal.style.bottom = '0px';
  document.getElementById('fabSearchBackdrop').style.display = 'block';
  renderFabResults('');

  setTimeout(() => {
    const real = document.getElementById('fabSearchInput');
    real.value = '';
    real.focus({ preventScroll: true });
    trigger.blur();
    positionFabSheet();
  }, 80);
};
window.closeFabSearch = function() {
  const modal = document.getElementById('fabSearchModal');
  modal.style.display = 'none';
  modal.style.bottom = '0px';
  document.getElementById('fabSearchBackdrop').style.display = 'none';
  document.getElementById('fabSearchInput').value = '';
  document.getElementById('fabSearchResults').innerHTML = '';
};

window.onFabSearch = function(val) { renderFabResults(val); };

function renderFabResults(val) {
  const q = val.trim().toLowerCase();
  const container = document.getElementById('fabSearchResults');
  if (!q) { container.innerHTML = ''; return; }
  let matches = [];
  CATEGORIES.forEach(cat => cat.products.forEach(p => {
    if (p.toLowerCase().includes(q)) matches.push({name:p, cat:cat.name, catId:cat.id, emoji:cat.emoji});
  }));

  let html = matches.slice(0, 30).map(m => {
    const inList = Object.values(list).find(i => i.name===m.name && i.catId===m.catId && !i.checked);
    const k = 'fab_' + m.catId + '_' + m.name.replace(/\W/g,'_');
    return `<div class="search-result-item" onclick="fabAdd('${m.catId}','${m.name.replace(/'/g,"\\'")}','${k}')" id="${k}">
      <span class="sri-name">${m.name}</span>
      <span class="sri-cat">${m.emoji} ${m.cat}</span>
    </div>`;
  }).join('');

  // "Add to catalogue" option when typing something not found
  if (q && matches.length === 0) {
    html = `<div class="no-results">Geen resultaten voor "<strong>${val}</strong>"</div>
      <div class="search-result-item" onclick="fabAddNew('${val.replace(/'/g,"\\'")}')">
        <span class="sri-name">➕ "${val}" toevoegen</span>
        <span class="sri-cat">Nieuw product</span>
      </div>`;
  } else if (q && !matches.find(m => m.name.toLowerCase() === q)) {
    // typed something but also show "add new" at bottom
    html += `<div class="search-result-item" onclick="fabAddNew('${val.replace(/'/g,"\\'")}')">
      <div class="sri-info">
        <div class="sri-name">➕ "${val}" toevoegen aan catalogus</div>
        <div class="sri-cat">Nieuw product bewaren voor later</div>
      </div>
    </div>`;
  }

  container.innerHTML = html;
}

window.fabAdd = function(catId, name, k) {
  addProduct(name, catId);
  showToast(name.split('|')[0].trim() + ' toegevoegd ✓');
  closeFabSearch();
};

window.fabAddNew = function(val) {
  closeFabSearch();
  // Pre-fill and open the custom modal
  document.getElementById('customCat').innerHTML = CATEGORIES.map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
  document.getElementById('customName').value = val;
  document.getElementById('customModal').classList.add('show');
};

// When saving a custom product, also add it to the CATEGORIES catalogue
const _origSaveCustom = window.saveCustom;
window.saveCustom = function() {
  const name = document.getElementById('customName').value.trim();
  const catId = document.getElementById('customCat').value;
  if (!name) return;
  // Add to local catalogue so it shows in future FAB searches
  const cat = CATEGORIES.find(c => c.id === catId);
  if (cat && !cat.products.includes(name)) {
    cat.products.push(name);
    cat.products.sort();
  }
  addProduct(name, catId);
  closeCustom();
};

</script>
</body>
